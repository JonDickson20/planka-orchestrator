<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planka Orchestrator Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1419;
    color: #e1e8ed;
    min-height: 100vh;
  }
  header {
    background: #1a2332;
    border-bottom: 1px solid #2d3748;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header h1 span { color: #4c9aff; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .orchestrator-badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 600;
  }
  .orchestrator-badge.online { background: #276749; color: #9ae6b4; }
  .orchestrator-badge.offline { background: #742a2a; color: #feb2b2; }
  .refresh-info {
    font-size: 12px;
    color: #718096;
  }
  .refresh-info .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #48bb78;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .panel {
    background: #1a2332;
    border: 1px solid #2d3748;
    border-radius: 8px;
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid #2d3748;
    font-weight: 600;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-body {
    padding: 12px 18px;
    max-height: 400px;
    overflow-y: auto;
  }
  .panel-body::-webkit-scrollbar { width: 6px; }
  .panel-body::-webkit-scrollbar-track { background: #1a2332; }
  .panel-body::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 3px; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
  }
  .badge-count {
    background: #2d3748;
    color: #a0aec0;
    min-width: 22px;
    text-align: center;
  }

  /* Active agents */
  .agent-card {
    background: #0f1419;
    border: 1px solid #2d3748;
    border-left: 3px solid #48bb78;
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .agent-card .agent-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .agent-card .project-name {
    font-weight: 600;
    font-size: 14px;
    color: #e2e8f0;
  }
  .agent-card .elapsed {
    font-size: 14px;
    color: #48bb78;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .agent-card .elapsed.warning { color: #ecc94b; }
  .agent-card .elapsed.danger { color: #fc8181; }
  .agent-card .card-id { font-size: 11px; color: #718096; }
  .agent-card .log-link {
    font-size: 11px;
    color: #90cdf4;
    cursor: pointer;
    text-decoration: underline;
    margin-left: 8px;
  }
  .agent-card .log-link:hover { color: #63b3ed; }
  .no-data {
    color: #718096;
    font-style: italic;
    padding: 20px 0;
    text-align: center;
  }

  /* Queue table */
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th, td {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid #2d3748;
    font-size: 13px;
  }
  th {
    color: #718096;
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
  }
  td.num { text-align: center; font-variant-numeric: tabular-nums; }
  td.num.nonzero { color: #fbd38d; font-weight: 600; }
  td.num.stuck { color: #fc8181; font-weight: 600; }

  /* Recent jobs */
  .full-width { grid-column: 1 / -1; }
  .log-row {
    cursor: pointer;
    transition: background 0.15s;
  }
  .log-row:hover { background: #243247; }
  .log-row td { font-size: 12px; }

  /* Log viewer */
  #log-viewer { display: none; }
  #log-viewer .panel-header {
    cursor: pointer;
    background: #243247;
  }
  #log-viewer .panel-header:hover { background: #2d3748; }
  #log-content {
    font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 500px;
    overflow-y: auto;
    color: #a0aec0;
    padding: 14px 18px;
  }
  .loading { text-align: center; padding: 30px; color: #718096; }

  /* Orchestrator stats bar */
  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 10px 24px;
    background: #151d28;
    border-bottom: 1px solid #2d3748;
    font-size: 12px;
    color: #718096;
  }
  .stats-bar .stat-label { color: #4a5568; margin-right: 4px; }
  .stats-bar .stat-value { color: #a0aec0; font-weight: 600; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<header>
  <h1><span>Planka</span> Orchestrator Dashboard</h1>
  <div class="header-right">
    <span class="orchestrator-badge offline" id="orch-badge">Offline</span>
    <div class="refresh-info"><span class="dot"></span>Auto-refresh 10s &mdash; <span id="last-updated">loading...</span></div>
  </div>
</header>
<div class="stats-bar" id="stats-bar" style="display:none">
  <div><span class="stat-label">Uptime:</span> <span class="stat-value" id="stat-uptime">-</span></div>
  <div><span class="stat-label">Poll interval:</span> <span class="stat-value" id="stat-poll">-</span></div>
  <div><span class="stat-label">Agent timeout:</span> <span class="stat-value" id="stat-timeout">-</span></div>
  <div><span class="stat-label">Max workers:</span> <span class="stat-value" id="stat-workers">-</span></div>
  <div><span class="stat-label">Last orchestrator update:</span> <span class="stat-value" id="stat-last-update">-</span></div>
</div>
<main>
  <!-- Active Agents -->
  <div class="panel">
    <div class="panel-header">
      Active Agents
      <span class="badge badge-count" id="active-count">0</span>
    </div>
    <div class="panel-body" id="active-agents">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <!-- Queue Depth -->
  <div class="panel">
    <div class="panel-header">Queue Depth by Project</div>
    <div class="panel-body" id="queue-depth">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <!-- Recent Jobs -->
  <div class="panel full-width">
    <div class="panel-header">
      Recent Jobs
      <span class="badge badge-count" id="recent-count">0</span>
    </div>
    <div class="panel-body" id="recent-jobs">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <!-- Log Viewer -->
  <div class="panel full-width" id="log-viewer">
    <div class="panel-header" onclick="closeLogViewer()">
      Log: <span id="log-viewer-name"></span> &mdash; click to close
    </div>
    <pre id="log-content"></pre>
  </div>
</main>

<script>
function formatElapsed(startISO) {
  const ms = Date.now() - new Date(startISO).getTime();
  const totalSec = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return h + "h " + String(m).padStart(2, "0") + "m " + String(s).padStart(2, "0") + "s";
  if (m > 0) return m + "m " + String(s).padStart(2, "0") + "s";
  return s + "s";
}

function formatUptime(startISO) {
  const ms = Date.now() - new Date(startISO).getTime();
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h > 0) return h + "h " + m + "m";
  return m + "m";
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString();
}

function timeAgo(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  const sec = Math.floor(ms / 1000);
  if (sec < 60) return sec + "s ago";
  const min = Math.floor(sec / 60);
  if (min < 60) return min + "m ago";
  const hrs = Math.floor(min / 60);
  if (hrs < 24) return hrs + "h " + (min % 60) + "m ago";
  const days = Math.floor(hrs / 24);
  return days + "d ago";
}

function elapsedClass(startISO) {
  const ms = Date.now() - new Date(startISO).getTime();
  const min = ms / 60000;
  if (min > 25) return "elapsed danger";
  if (min > 15) return "elapsed warning";
  return "elapsed";
}

// Keep cached data for live timer updates
let cachedActive = [];

async function fetchStatus() {
  try {
    const res = await fetch("/api/status");
    const data = await res.json();

    cachedActive = data.active;

    // Orchestrator status
    const badge = document.getElementById("orch-badge");
    const statsBar = document.getElementById("stats-bar");
    if (data.orchestrator) {
      const lastUpdate = new Date(data.orchestrator.lastUpdate).getTime();
      const stale = Date.now() - lastUpdate > 120000; // 2 min
      badge.className = "orchestrator-badge " + (stale ? "offline" : "online");
      badge.textContent = stale ? "Stale" : "Online";
      statsBar.style.display = "flex";
      document.getElementById("stat-uptime").textContent = formatUptime(data.orchestrator.startedAt);
      document.getElementById("stat-poll").textContent = data.orchestrator.pollInterval + "s";
      document.getElementById("stat-timeout").textContent = data.orchestrator.agentTimeout + " min";
      document.getElementById("stat-workers").textContent = data.orchestrator.maxWorkers;
      document.getElementById("stat-last-update").textContent = timeAgo(data.orchestrator.lastUpdate);
    } else {
      badge.className = "orchestrator-badge offline";
      badge.textContent = "Offline";
      statsBar.style.display = "none";
    }

    renderActiveAgents();

    // Recent jobs
    const recentEl = document.getElementById("recent-jobs");
    document.getElementById("recent-count").textContent = data.recent.length;
    if (data.recent.length === 0) {
      recentEl.innerHTML = '<div class="no-data">No recent jobs</div>';
    } else {
      recentEl.innerHTML = '<table>' +
        '<thead><tr><th>Log File</th><th>Card ID</th><th>Started</th><th>Size</th><th></th></tr></thead>' +
        '<tbody>' + data.recent.map(function(l) {
          return '<tr class="log-row" onclick="viewLog(\'' + l.filename + '\')">' +
            '<td style="color:#90cdf4">' + l.filename + '</td>' +
            '<td style="color:#718096">' + l.cardId + '</td>' +
            '<td style="color:#718096">' + timeAgo(l.startTime) + '</td>' +
            '<td style="color:#718096">' + formatSize(l.size) + '</td>' +
            '<td><button onclick="event.stopPropagation();viewLog(\'' + l.filename + '\')" style="background:#2d3748;color:#90cdf4;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px">View</button></td>' +
            '</tr>';
        }).join("") + '</tbody></table>';
    }
  } catch (err) {
    console.error("Failed to fetch status:", err);
  }
}

function renderActiveAgents() {
  const activeEl = document.getElementById("active-agents");
  document.getElementById("active-count").textContent = cachedActive.length;
  if (cachedActive.length === 0) {
    activeEl.innerHTML = '<div class="no-data">No active agents</div>';
  } else {
    activeEl.innerHTML = cachedActive.map(function(a) {
      var logClick = a.logFile ? ' <span class="log-link" onclick="viewLog(\'' + a.logFile + '\')">view log</span>' : '';
      return '<div class="agent-card">' +
        '<div class="agent-header">' +
          '<span class="project-name">' + (a.projectName || "Unknown") + '</span>' +
          '<span class="' + elapsedClass(a.startTime) + '">' + formatElapsed(a.startTime) + '</span>' +
        '</div>' +
        '<div class="card-id">Card: ' + a.cardId + logClick + '</div>' +
      '</div>';
    }).join("");
  }
}

async function fetchQueue() {
  try {
    const res = await fetch("/api/queue");
    const data = await res.json();

    var el = document.getElementById("queue-depth");
    if (data.length === 0) {
      el.innerHTML = '<div class="no-data">No projects configured</div>';
      return;
    }
    el.innerHTML = '<table>' +
      '<thead><tr><th>Project</th><th>Fix</th><th>Feature</th><th>Working</th><th>Review</th><th>Complete</th><th>Stuck</th></tr></thead>' +
      '<tbody>' + data.map(function(p) {
        if (p.error) {
          return '<tr><td>' + p.name + '</td><td colspan="6" style="color:#fc8181">' + p.error + '</td></tr>';
        }
        var c = p.counts;
        function cell(v, cls) {
          var extra = v > 0 ? (cls || " nonzero") : "";
          return '<td class="num' + extra + '">' + v + '</td>';
        }
        return '<tr><td>' + p.name + '</td>' +
          cell(c.Fix) + cell(c.Feature) + cell(c.Working) +
          cell(c["Ready to Review"]) + cell(c.Complete) + cell(c.Stuck, " stuck") +
          '</tr>';
      }).join("") + '</tbody></table>';
  } catch (err) {
    console.error("Failed to fetch queue:", err);
  }
}

async function viewLog(filename) {
  var viewer = document.getElementById("log-viewer");
  var content = document.getElementById("log-content");
  var nameEl = document.getElementById("log-viewer-name");
  nameEl.textContent = filename;
  content.textContent = "Loading...";
  viewer.style.display = "block";
  try {
    var res = await fetch("/api/logs/" + encodeURIComponent(filename));
    content.textContent = await res.text();
    content.scrollTop = content.scrollHeight;
  } catch {
    content.textContent = "Failed to load log file.";
  }
}

function closeLogViewer() {
  document.getElementById("log-viewer").style.display = "none";
}

function refresh() {
  fetchStatus();
  fetchQueue();
  document.getElementById("last-updated").textContent = new Date().toLocaleTimeString();
}

// Full refresh every 10 seconds
refresh();
setInterval(refresh, 10000);

// Update elapsed timers every second for smooth counting
setInterval(renderActiveAgents, 1000);
</script>
</body>
</html>
